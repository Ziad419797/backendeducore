# ===============================
# Application
# ===============================
spring.application.name=educore

# ===============================
# Database (Railway)
# ===============================
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# Server
# ===============================
server.port=${PORT:8080}

# ===============================
# Logging
# ===============================
logging.level.com.educore.security=DEBUG
logging.level.org.springframework.security=DEBUG

# ===============================
# Session Configuration
# ===============================
app.session.timeout=30
app.max.sessions.per.user=3
app.auto-logout.enabled=true
app.support.whatsapp=+201234567890

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ===============================
# JWT
# ===============================
app.jwt.secret=${APP_JWT_SECRET:dev-secret-key-educore-123456}
jwt.expiration.minutes=30
jwt.refresh-expiration.hours=24
